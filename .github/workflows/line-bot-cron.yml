name: LINE Bot Cron Job

on:
  schedule:
    # 每天早上 8 點執行 (UTC 0 點) - 調整為 0:15 以避開整點高峰
    - cron: '15 0 * * *'
  workflow_dispatch:
    inputs:
      test_date:
        description: '測試日期 (YYYY-MM-DD)，留空則使用今天'
        required: false
        default: ''

jobs:
  notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # LTS version
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run LINE Notify Script
      id: run_bot
      env:
        TZ: Asia/Taipei
        GITHUB_REPOSITORY: ${{ github.repository }}
        GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        TEST_DATE: ${{ github.event.inputs.test_date }}
      run: node scripts/line-bot.js

    - name: Notify on Failure
      if: failure()
      env:
        LINE_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER: ${{ secrets.LINE_USER_ID }}
      run: |
        REPO_NAME="${{ github.repository }}"
        RUN_ID="${{ github.run_id }}"
        RUN_NUM="${{ github.run_number }}"
        curl -v -X POST https://api.line.me/v2/bot/message/push \
        -H 'Content-Type: application/json' \
        -H "Authorization: Bearer $LINE_TOKEN" \
        -d "{
          \"to\": \"$LINE_USER\",
          \"messages\": [{
            \"type\": \"text\",
            \"text\": \"🚨 【系統警報】執行失敗！\n\n專案: $REPO_NAME\n編號: #$RUN_NUM\n日誌: https://github.com/$REPO_NAME/actions/runs/$RUN_ID\n\n請儘速檢查配置或憑證狀態。\"
          }]
        }"
